# =============================================================================
# PetCare Software — Docker Compose Configuration
# =============================================================================
# Start the entire application with a single command:
#
#   cp .env.example .env          # First time only
#   docker compose up --build     # Build and start all services
#
# Docker Compose automatically reads .env from the project root.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MongoDB — Primary Database
  # ---------------------------------------------------------------------------
  petcare-mongo:
    image: mongo:${MONGO_VERSION:-7.0}
    container_name: petcare-mongo
    hostname: petcare-mongo
    restart: unless-stopped

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      # Persistent data storage (Docker-managed named volume)
      - mongo-data:/data/db
      # Initialization scripts (run only on first database creation)
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-petcare_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-petcare_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-petcare}

    healthcheck:
      test: |
        mongosh --quiet --eval '
          db.runCommand({ ping: 1 }).ok === 1 ? quit(0) : quit(1)
        '
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - petcare-network

  # ---------------------------------------------------------------------------
  # Backend — Node.js / Express API
  # ---------------------------------------------------------------------------
  petcare-backend:
    build:
      context: ./backend
      target: dev
    container_name: petcare-backend
    hostname: petcare-backend
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-5000}:5000"

    volumes:
      # Bind-mount the source for hot reload in development
      - ./backend/src:/app/src

    env_file:
      - .env

    environment:
      # Override defaults with values suited for Docker networking
      MONGO_URI: ${MONGO_URI:-mongodb://petcare_user:secure_password_change_me@petcare-mongo:27017/petcare?authSource=admin}
      PORT: 5000
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:8080}

    depends_on:
      petcare-mongo:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/api/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - petcare-network

  # ---------------------------------------------------------------------------
  # Frontend — React / Vite
  # ---------------------------------------------------------------------------
  petcare-frontend:
    build:
      context: ./frontend
      target: dev
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: petcare-frontend
    hostname: petcare-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-5173}:5173"

    volumes:
      # Bind-mount the source for hot reload in development
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts

    env_file:
      - .env

    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}

    depends_on:
      petcare-backend:
        condition: service_started

    networks:
      - petcare-network

  # ---------------------------------------------------------------------------
  # Mongo Express — Web UI for MongoDB (development only)
  # ---------------------------------------------------------------------------
  petcare-mongo-express:
    image: mongo-express:1.0-20-alpine3.19
    container_name: petcare-mongo-express
    hostname: petcare-mongo-express
    restart: unless-stopped
    profiles:
      - development
      - tools

    ports:
      - "${ME_PORT:-8081}:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-petcare_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-petcare_dev_password}
      ME_CONFIG_MONGODB_URL: ${MONGO_URI:-mongodb://petcare_user:secure_password_change_me@petcare-mongo:27017/petcare?authSource=admin}
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"

    depends_on:
      petcare-mongo:
        condition: service_healthy

    networks:
      - petcare-network

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  mongo-data:
    name: petcare_mongo_data
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  petcare-network:
    name: petcare_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16